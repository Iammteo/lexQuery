name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend:
    name: Backend — lint, type check, test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: lexquery
          POSTGRES_PASSWORD: lexquery_dev
          POSTGRES_DB: lexquery_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt ruff mypy pytest-env

      - name: Lint (ruff)
        run: ruff check app tests

      - name: Format check (ruff)
        run: ruff format --check app tests

      - name: Type check (mypy)
        run: mypy app --ignore-missing-imports --no-strict-optional

      - name: Run tests
        env:
          APP_ENV: test
          SECRET_KEY: ci-test-secret-key
          DATABASE_URL: postgresql+asyncpg://lexquery:lexquery_dev@localhost:5432/lexquery_test
          DATABASE_URL_SYNC: postgresql://lexquery:lexquery_dev@localhost:5432/lexquery_test
          API_KEY_PEPPER: ci-test-pepper
          REDIS_URL: redis://localhost:6379/0
          WEAVIATE_URL: http://localhost:8080
        run: pytest -v

  frontend:
    name: Frontend — lint, type check
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check
