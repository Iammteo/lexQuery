version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    container_name: lexquery_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lexquery}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lexquery_dev}
      POSTGRES_DB: ${POSTGRES_DB:-lexquery}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lexquery}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: lexquery_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  weaviate:
    image: semitechnologies/weaviate:1.24.1
    container_name: lexquery_weaviate
    ports:
      - "8080:8080"
      - "50051:50051"
    environment:
      QUERY_DEFAULTS_LIMIT: 25
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "true"
      PERSISTENCE_DATA_PATH: /var/lib/weaviate
      DEFAULT_VECTORIZER_MODULE: none
      ENABLE_MODULES: ""
      CLUSTER_HOSTNAME: node1
    volumes:
      - weaviate_data:/var/lib/weaviate
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/v1/.well-known/ready"]
      interval: 10s
      timeout: 5s
      retries: 10

  # Celery worker for ingestion pipeline (Phase 1)
  worker:
    build:
      context: ./backend
      dockerfile: ../infra/docker/Dockerfile.backend
    container_name: lexquery_worker
    command: celery -A app.workers.celery_app worker --loglevel=info --queues=ingestion
    env_file:
      - ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      weaviate:
        condition: service_healthy
    volumes:
      - ./backend:/app
    profiles:
      - full  # only starts with: docker compose --profile full up

volumes:
  postgres_data:
  redis_data:
  weaviate_data:
